<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <base href="../">
    <meta property="og:title" content="Adeliya Mukhtar · Offstage Той">
    <meta property="og:description" content="Сізді Offstage клубымыздың түлектерін шығарып салу тойына шақырамыз · 30 Сәуір 2026">
    <meta property="og:image" content="https://offstageteam.github.io/offstage_byebye/og-default.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://offstageteam.github.io/offstage_byebye/adeliya/">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://offstageteam.github.io/offstage_byebye/og-default.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offstage · Шақыру</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:         #07070A;
            --bg2:        #0D0C10;
            --bg3:        #131118;
            --gold:       #C9A061;
            --gold-light: #E8CC8A;
            --gold-dim:   rgba(201,160,97,0.18);
            --gold-glow:  rgba(201,160,97,0.06);
            --red:        #7A1A1A;
            --text:       #F0EBE2;
            --text-muted: #7A6E60;
            --border:     rgba(201,160,97,0.18);
        }

        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ─── NOISE OVERLAY ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-size: 180px;
        }

        /* ─── BACKGROUND ORNAMENTS ─── */
        .bg-ornaments {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .orn {
            position: absolute;
            opacity: 0;
            animation: orn-drift linear infinite;
        }

        @keyframes orn-drift {
            0%   { transform: translateY(0px)   rotate(0deg);   opacity: 0.032; }
            50%  { transform: translateY(-28px) rotate(180deg); opacity: 0.055; }
            100% { transform: translateY(0px)   rotate(360deg); opacity: 0.032; }
        }

        /* ─── GRADIENT RADIALS ─── */
        .radial-top {
            position: fixed;
            top: -30vh;
            left: 50%;
            transform: translateX(-50%);
            width: 80vw;
            height: 80vw;
            max-width: 900px;
            max-height: 900px;
            background: radial-gradient(ellipse, rgba(201,160,97,0.07) 0%, transparent 65%);
            pointer-events: none;
            z-index: 0;
        }

        /* ─── CONTENT ─── */
        .content { position: relative; z-index: 1; }

        /* ─── HERO ─── */
        .hero {
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px 100px;
            position: relative;
            text-align: center;
        }

        .brand-tag {
            font-size: 11px;
            letter-spacing: 0.55em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 52px;
            opacity: 0.75;
        }

        /* Photo */
        .photo-wrap {
            position: relative;
            margin-bottom: 44px;
        }

        .photo-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid var(--gold);
            animation: ring-pulse 4s ease-in-out infinite;
        }

        .photo-ring-1 { inset: -14px; opacity: 0.35; }
        .photo-ring-2 { inset: -28px; opacity: 0.12; animation-delay: 0.7s; }
        .photo-ring-3 { inset: -44px; opacity: 0.05; animation-delay: 1.4s; }

        @keyframes ring-pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.04); }
        }

        .hero-img {
            width: clamp(180px, 30vw, 240px);
            height: clamp(180px, 30vw, 240px);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--gold);
            display: block;
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, #191410 0%, #231C12 100%);
        }

        .hero-initials {
            width: clamp(180px, 30vw, 240px);
            height: clamp(180px, 30vw, 240px);
            border-radius: 50%;
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #191410 0%, #231C12 100%);
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(52px, 10vw, 80px);
            color: var(--gold);
            opacity: 0.7;
            position: relative;
            z-index: 1;
        }

        /* Name */
        .hero-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(48px, 10vw, 96px);
            font-weight: 300;
            line-height: 1;
            letter-spacing: 0.02em;
        }

        .hero-name-last {
            display: block;
            font-style: italic;
            color: var(--gold-light);
            font-size: clamp(36px, 7vw, 72px);
            margin-top: 4px;
        }

        .hero-divider {
            width: 72px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 28px auto;
        }

        .hero-invite {
            font-size: clamp(14px, 2vw, 16px);
            line-height: 2;
            color: var(--text-muted);
            max-width: 520px;
            letter-spacing: 0.025em;
        }

        .hero-invite strong {
            color: var(--text);
            font-weight: 400;
        }

        .scroll-arrow {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .scroll-arrow span {
            font-size: 10px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-muted);
            opacity: 0.6;
        }

        .scroll-arrow-line {
            width: 1px;
            height: 48px;
            background: linear-gradient(180deg, var(--gold), transparent);
            animation: line-grow 2s ease-in-out infinite;
        }

        @keyframes line-grow {
            0%   { transform: scaleY(0); transform-origin: top; opacity: 1; }
            50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
            100% { transform: scaleY(1); transform-origin: top; opacity: 0; }
        }

        /* ─── SECTION COMMON ─── */
        .section {
            padding: clamp(60px, 10vw, 100px) clamp(20px, 5vw, 40px);
            max-width: 880px;
            margin: 0 auto;
        }

        .section-full {
            padding: clamp(60px, 10vw, 100px) clamp(20px, 5vw, 40px);
        }

        .sep {
            display: flex;
            align-items: center;
            gap: 16px;
            max-width: 400px;
            margin: 0 auto;
        }

        .sep-line {
            flex: 1;
            height: 1px;
        }

        .sep-line-l { background: linear-gradient(90deg, transparent, var(--border)); }
        .sep-line-r { background: linear-gradient(90deg, var(--border), transparent); }

        .sep-gem {
            width: 7px;
            height: 7px;
            border: 1px solid var(--gold);
            transform: rotate(45deg);
            opacity: 0.5;
        }

        .eyebrow {
            font-size: 10px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.65;
            text-align: center;
            margin-top: 36px;
            margin-bottom: 16px;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(30px, 5vw, 50px);
            font-weight: 300;
            text-align: center;
            margin-bottom: 48px;
        }

        /* ─── COUNTDOWN ─── */
        .countdown-wrap {
            display: flex;
            justify-content: center;
            gap: clamp(8px, 2.5vw, 28px);
            flex-wrap: wrap;
        }

        .cd-card {
            position: relative;
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: clamp(18px, 4vw, 32px) clamp(14px, 3vw, 26px);
            min-width: clamp(76px, 17vw, 130px);
            text-align: center;
            overflow: hidden;
        }

        .cd-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .cd-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at top, rgba(201,160,97,0.06), transparent 65%);
            pointer-events: none;
        }

        .cd-num {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(44px, 9vw, 76px);
            font-weight: 600;
            color: var(--gold-light);
            line-height: 1;
            display: block;
        }

        .cd-lbl {
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 10px;
            display: block;
        }

        /* ─── DETAILS CARD ─── */
        .details-card {
            position: relative;
            background: var(--bg2);
            border: 1px solid var(--border);
            padding: clamp(28px, 6vw, 52px) clamp(24px, 5vw, 48px);
            overflow: hidden;
        }

        .details-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .details-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at top, rgba(201,160,97,0.04), transparent 55%);
            pointer-events: none;
        }

        /* Corner ornaments */
        .corner {
            position: absolute;
            width: 36px;
            height: 36px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.25;
        }
        .c-tl { top: 14px; left: 14px;  border-width: 1px 0 0 1px; }
        .c-tr { top: 14px; right: 14px; border-width: 1px 1px 0 0; }
        .c-bl { bottom: 14px; left: 14px;  border-width: 0 0 1px 1px; }
        .c-br { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }

        .detail-row {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            padding: 22px 0;
            border-bottom: 1px solid rgba(201,160,97,0.07);
            position: relative;
            z-index: 1;
        }

        .detail-row:first-of-type { padding-top: 0; }
        .detail-row:last-of-type  { padding-bottom: 0; border-bottom: none; }

        .detail-gem {
            margin-top: 6px;
            width: 7px;
            height: 7px;
            border: 1px solid var(--gold);
            transform: rotate(45deg);
            flex-shrink: 0;
            opacity: 0.55;
        }

        .detail-label {
            font-size: 9px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .detail-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(22px, 4vw, 34px);
            font-weight: 400;
            line-height: 1.15;
        }

        .detail-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 5px;
            letter-spacing: 0.03em;
        }

        /* ─── GALLERY ─── */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        @media (max-width: 640px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .gal-item {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            cursor: pointer;
        }

        .gal-item::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid transparent;
            transition: border-color 0.35s;
            pointer-events: none;
        }

        .gal-item:hover::after { border-color: var(--gold); }

        .gal-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: block;
        }

        .gal-item:hover img { transform: scale(1.07); }

        .gal-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #110F0C 0%, #1C1812 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .gal-ph-gem {
            width: 20px;
            height: 20px;
            border: 1px solid var(--gold);
            transform: rotate(45deg);
            opacity: 0.18;
        }

        .gal-ph-txt {
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
            opacity: 0.35;
        }

        /* ─── FOOTER ─── */
        .footer {
            padding: clamp(60px, 10vw, 90px) 24px;
            text-align: center;
            border-top: 1px solid var(--border);
        }

        .footer-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(38px, 8vw, 68px);
            font-weight: 300;
            letter-spacing: 0.18em;
            color: var(--gold);
            margin-bottom: 14px;
        }

        .footer-sub {
            font-size: 11px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* ─── LIGHTBOX ─── */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(4,3,6,0.97);
            z-index: 9000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 32px;
            backdrop-filter: blur(4px);
        }

        .lightbox.open { display: flex; }

        .lightbox img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border: 1px solid var(--border);
        }

        .lb-close {
            position: absolute;
            top: 20px; right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 36px;
            cursor: pointer;
            line-height: 1;
            transition: color 0.2s;
        }

        .lb-close:hover { color: var(--text); }

        /* ─── ERROR ─── */
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-align: center;
            padding: 24px;
        }

        .error-gem {
            width: 32px;
            height: 32px;
            border: 1px solid var(--gold);
            transform: rotate(45deg);
            opacity: 0.3;
        }

        .error-msg {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: var(--text-muted);
        }

        /* ─── FADE-UP ─── */
        .fu {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.9s ease, transform 0.9s ease;
        }

        .fu.vis {
            opacity: 1;
            transform: translateY(0);
        }

        .fu-d1 { transition-delay: 0.1s; }
        .fu-d2 { transition-delay: 0.2s; }
        .fu-d3 { transition-delay: 0.3s; }
        .fu-d4 { transition-delay: 0.4s; }
    
        /* ─── ENTRY SCREEN ─── */
        .entry-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #040406;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            transition: opacity 1.2s ease, visibility 1.2s ease;
        }

        .entry-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .entry-ornament-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .entry-ornament-bot {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .entry-corner {
            position: absolute;
            width: 48px; height: 48px;
            border-color: var(--gold);
            border-style: solid;
            opacity: 0.3;
        }
        .entry-corner.tl { top: 24px; left: 24px; border-width: 1px 0 0 1px; }
        .entry-corner.tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
        .entry-corner.bl { bottom: 24px; left: 24px; border-width: 0 0 1px 1px; }
        .entry-corner.br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }

        .entry-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(52px, 12vw, 100px);
            font-weight: 300;
            letter-spacing: 0.2em;
            color: var(--gold);
            animation: entry-logo-in 1.5s ease forwards;
            opacity: 0;
        }

        .entry-tagline {
            font-size: 11px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 12px;
            margin-bottom: 56px;
            animation: entry-logo-in 1.5s ease 0.3s forwards;
            opacity: 0;
        }

        .entry-gem-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 48px;
            animation: entry-logo-in 1.5s ease 0.5s forwards;
            opacity: 0;
        }

        .entry-gem-line {
            width: 60px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(201,160,97,0.4));
        }
        .entry-gem-line.r {
            background: linear-gradient(90deg, rgba(201,160,97,0.4), transparent);
        }

        .entry-gem-diamond {
            width: 8px; height: 8px;
            border: 1px solid var(--gold);
            transform: rotate(45deg);
            opacity: 0.6;
        }

        .entry-btn {
            position: relative;
            padding: 18px 52px;
            background: transparent;
            border: 1px solid rgba(201,160,97,0.5);
            color: var(--gold-light);
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 0.25em;
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.3s, color 0.3s;
            animation: entry-logo-in 1.5s ease 0.7s forwards;
            opacity: 0;
        }

        .entry-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(201,160,97,0.06);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s ease;
        }

        .entry-btn:hover { border-color: var(--gold); color: #fff; }
        .entry-btn:hover::before { transform: scaleX(1); }

        .entry-note {
            position: absolute;
            bottom: 36px;
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
            opacity: 0.4;
            animation: entry-logo-in 1.5s ease 1s forwards;
        }

        @keyframes entry-logo-in {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ─── MUSIC BUTTON ─── */
        .music-btn {
            position: fixed;
            bottom: 28px;
            right: 28px;
            z-index: 500;
            width: 44px;
            height: 44px;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--gold);
            font-size: 18px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: border-color 0.25s, background 0.25s;
        }

        .music-btn.visible { display: flex; }
        .music-btn:hover { border-color: var(--gold); background: var(--bg3); }

        /* hidden YT player */
    </style>
    <script>window.FORCE_GUEST = "adeliya";</script>
</head>
<body>

<!-- ENTRY SCREEN -->
<div class="entry-screen" id="entry-screen">
    <div class="entry-ornament-top"></div>
    <div class="entry-ornament-bot"></div>
    <div class="entry-corner tl"></div>
    <div class="entry-corner tr"></div>
    <div class="entry-corner bl"></div>
    <div class="entry-corner br"></div>

    <div class="entry-logo">OFFSTAGE</div>
    <div class="entry-tagline">Той · 2026</div>

    <div class="entry-gem-row">
        <div class="entry-gem-line"></div>
        <div class="entry-gem-diamond"></div>
        <div class="entry-gem-line r"></div>
    </div>

    <button class="entry-btn" onclick="enterSite()">Кіру</button>
    <p class="entry-note">Музыкамен ашылады</p>
</div>

<!-- MUSIC TOGGLE -->
<button class="music-btn" id="music-btn" onclick="toggleMusic()" title="Музыка">♪</button>

<!-- Hidden YouTube player -->

<div class="bg-ornaments" id="bg-ornaments"></div>
<div class="radial-top"></div>

<div class="content" id="app"></div>

<div class="lightbox" id="lightbox">
    <button class="lb-close" id="lb-close">×</button>
    <img id="lb-img" src="" alt="">
</div>

<script>
/* ============================================================
   GUEST DATA — edit heroPhoto, photos[], time per person
   Photos go in photos/[id]/ folder
   ============================================================ */
const GUESTS = {
    alen: {
        name: 'Alen',
        surname: 'Smailov',
        heroPhoto: 'photos/alen/hero.png',
        photos: [],
        time: '19:00',
        music: 'audio/main.mp3'
    },
    iliyas: {
        name: 'Iliyas',
        surname: 'Malybayev',
        heroPhoto: '',
        photos: [],
        time: '19:00',

/* ──── COUNTDOWN ──── */
function startCountdown() {
    function tick() {
        const diff = EVENT.countdownTo - new Date();
        if (diff <= 0) {
            ['cd-d','cd-h','cd-m','cd-s'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = '00'; });
            return;
        }
        const d = Math.floor(diff / 86400000);
        const h = Math.floor(diff % 86400000 / 3600000);
        const m = Math.floor(diff % 3600000 / 60000);
        const s = Math.floor(diff % 60000 / 1000);
        const f = n => String(n).padStart(2, '0');
        const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = f(v); };
        set('cd-d', d); set('cd-h', h); set('cd-m', m); set('cd-s', s);
    }
    tick();
    setInterval(tick, 1000);
}

/* ──── SCROLL FADE ──── */
function initScrollFade() {
    const io = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); io.unobserve(e.target); } });
    }, { threshold: 0.08 });
    setTimeout(() => document.querySelectorAll('.fu').forEach(el => io.observe(el)), 80);
}

    for (let i = 0; i < 14; i++) {

/* ──── LIGHTBOX ──── */
function openLB(src) {
    document.getElementById('lb-img').src = src;
    document.getElementById('lightbox').classList.add('open');
}

document.getElementById('lb-close').onclick = closeLB;
document.getElementById('lightbox').onclick = e => { if (e.target === e.currentTarget) closeLB(); };
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLB(); });

function closeLB() { document.getElementById('lightbox').classList.remove('open'); }

/* ──── ENTRY + MUSIC ──── */
let audio = null;
let musicPlaying = false;

function enterSite() {
    document.getElementById('entry-screen').classList.add('hidden');
    document.getElementById('music-btn').classList.add('visible');
    audio = new Audio(guest.music);
    audio.loop = true;
    audio.volume = 0.6;
    if (guest.musicStart) audio.currentTime = guest.musicStart;
    audio.play();
    musicPlaying = true;
}

function toggleMusic() {
    if (!audio) return;
    const btn = document.getElementById('music-btn');
    if (musicPlaying) {
        audio.pause();
        btn.style.opacity = '0.4';
        musicPlaying = false;
    } else {
        audio.play();
        btn.style.opacity = '1';
        musicPlaying = true;
    }
}

/* ──── UTILS ──── */
function esc(str) {
    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}
